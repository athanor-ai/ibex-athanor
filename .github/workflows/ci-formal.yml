name: Ibex OSS Formal CI

on:
  pull_request:
    branches:
      - '*'

jobs:
  guarded-kairos-runner-restart:
    name: Guarded kairos highmem runner restart
    runs-on: nixos
    steps:
      - name: IMDS hostname guard
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          service='actions.runner.athanor-ai-athanor-kairos.kani-highmem-1.service'
          imds_name="$(curl -fsS -H Metadata:true 'http://169.254.169.254/metadata/instance/compute/name?api-version=2021-02-01&format=text' || true)"
          host_name="$(hostname || true)"
          runner_name="${RUNNER_NAME:-}"

          echo "runner_name=${runner_name:-unavailable}"
          echo "imds_name=${imds_name:-unavailable}"
          echo "host_name=${host_name:-unavailable}"
          if systemctl list-unit-files "$service" --no-pager --no-legend >/tmp/kairos-runner-unit.txt 2>/dev/null; then
            service_present=true
          else
            service_present=false
          fi
          echo "service_present=$service_present"

          target=false
          if [ "$runner_name" = "ibex-oss-fv-1" ]; then
            target=true
          fi
          if { [ "${imds_name:-}" = "ibex-oss-fv" ] || [ "${host_name:-}" = "ibex-oss-fv" ]; } && [ "$service_present" = "true" ]; then
            target=true
          fi

          if [ "$target" != "true" ]; then
            echo "target=false" >> "$GITHUB_OUTPUT"
            echo "Guard result: not the ibex host with the kairos highmem unit; no-op."
            exit 0
          fi

          echo "target=true" >> "$GITHUB_OUTPUT"
          echo "Guard result: target runner reached."

      - name: Restart kani-highmem kairos runner service
        if: steps.guard.outputs.target == 'true'
        shell: bash
        run: |
          set -euo pipefail
          service='actions.runner.athanor-ai-athanor-kairos.kani-highmem-1.service'
          sudo systemctl restart "$service"
          echo "restart_rc=0"
          sudo systemctl is-active --quiet "$service"
          sudo systemctl status --no-pager "$service" | sed -n '1,25p'

      - name: Non-target receipt
        if: steps.guard.outputs.target != 'true'
        shell: bash
        run: |
          echo "No restart attempted; guarded job landed on a non-target runner."
